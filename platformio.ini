[env:esp32-c6-devkitc-1]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino

monitor_speed = 115200
board_build.filesystem = littlefs

; Sélection matérielle — décommenter selon le PCB assemblé.
; Par défaut : pas d'affichage (DISPLAY_NONE).
build_flags =
    ; -D DISPLAY_TYPE=DISPLAY_OLED
    ; -D DISPLAY_TYPE=DISPLAY_TM1637_BAR
    ; -D DISPLAY_TYPE=DISPLAY_TM1637_7SEG
    ; -D LEDS_PER_ARM=4
    ; -D FAN_PRESENT=1

lib_deps =
    bblanchon/ArduinoJson @ ^7
    paulstoffregen/OneWire @ ^2.3
    milesburton/DallasTemperature @ ^3.11
    links2004/WebSockets @ ^2.4
    knolleary/PubSubClient @ ^2.8
    adafruit/Adafruit GFX Library @ ^1.11
    adafruit/Adafruit SSD1306 @ ^2.5
    erriez/ErriezTM1637 @ ^1.0
